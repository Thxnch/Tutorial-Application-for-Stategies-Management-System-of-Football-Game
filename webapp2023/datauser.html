<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>เว็บแอปพลิเคชันสื่อการสอนระบบการจัดการกลยุทธ์การเล่นฟุตบอล</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,100;0,200;0,400;1,100&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            padding-top: 56px;
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('images/bg2.jpg');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
        }

        .navbar {
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1001;
            background-color: black;

            display: block;
        }

        .navbar-brand {
            color: white;
        }

        ul {
            position: fixed;
            top: 56px;
            /* ปรับค่า top ตามความต้องการ */
            width: 100vw;
            left: 0;
            z-index: 1002;
            /* ให้ z-index มีค่าสูงกว่า .col-8 */
            background-color: black;
        }

        @media (max-width: 576px) {
            body {
                font-size: 14px;
                /* ปรับขนาดฟ้อนท์เพื่อให้พอดีกับจอโทรศัพท์ */
            }
        }

        .nav-link {
            color: white;
        }

        .nav-link.active {
            color: black;
            background-color: white;
            /* หรือสีที่คุณต้องการ */
            border-radius: 10px;
        }

        h1,
        h2,
        h3,
        p {
            color: #333;
        }

        .fullWidthCard {
            left: 0;
            right: 0;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.1);
            /* สีขาวทึบทับด้วยสีใส */
            color: white;
            /* ตัวหนังสือสีขาว */
            border: 1px solid white;
            /* ขอบสีขาว */
        }

        .card-title,
        .card-text {
            color: white;
            /* ทำให้ตัวหนังสือใน card-title และ card-text เป็นสีขาว */
        }

        .btn-outline-dark {
            color: white;
            border-color: white;
            /* ขอบปุ่มสีขาว */
        }

        .btn-outline-dark:hover {
            color: #000;
            background-color: white;
            /* สีพื้นหลังปุ่มเมื่อโฮเวอร์ */
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg ">
        <div class="container-fluid">
            <a class="navbar-brand" href="media1.html">TacTics</a>
            <div>
                <button id="logout" class="btn btn-sm btn-outline-danger">ออกจากระบบ</button>
            </div>
        </div>
    </nav>
    <ul class="nav nav-tabs">
        <li class="nav-item">
            <a class="nav-link " href="media1.html">สื่อการสอน</a>
        </li>
        <li class="nav-item">
            <a class="nav-link " href="exercise.html">แบบฝึกหัด</a>
        </li>
        <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="datauser.html">ข้อมูลส่วนตัว</a>
        </li>
    </ul>

    <div class="container-fluid mt-5">
        <div class="row">
            <div class="col-md-6 mx-auto">
                <div class="card" id="fullWidthCard">
                    <div class="card-header">
                        <h4>ข้อมูลส่วนตัว</h4>
                    </div>
                    <div class="card-body">
                        <h5 class="card-title" id="username">ชื่อผู้ใช้: </h5>
                        <p></p>
                        <p class="card-text" id="room">ชั้น: </p>
                        <p class="card-text" id="studentid">รหัสนักศึกษา: </p>
                        <p class="card-text" id="number">เลขที่: </p>
                        <p class="card-text" id="major">สาขาวิชา: </p>


                        <button id="editProfileButton" type="button"
                            class="btn btn-outline-dark ms-auto">แก้ไขข้อมูล</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container-fluid mt-5">
        <div class="row">
            <div class="col-md-6 mx-auto">
                <div class="card" id="editProfileCard" style="display: none;">
                    <div class="card-header">
                        <h4>แก้ไขข้อมูลส่วนตัว</h4>
                    </div>
                    <div class="card-body">
                        <input type="text" id="newUsername" placeholder="ชื่อผู้ใช้ใหม่" class="form-control mb-2"required>
                        <select class="form-select mb-2" id="newRoom" required>
                            <option selected>-เลือกชั้น-</option>
                            <option value="ปวช.1/1">ปวช.1/1</option>
                            <option value="ปวช.1/2">ปวช.1/2</option>
                            <option value="ปวช.1/3">ปวช.1/3</option>
                            <option value="ปวช.1/4">ปวช.1/4</option>
                            <option value="ปวช.1/5">ปวช.1/5</option>
                            <option value="ปวช.1/6">ปวช.1/6</option>
                            <option value="ปวช.1/7">ปวช.1/7</option>
                            <option value="ปวช.1/8">ปวช.1/8</option>
                            <option value="ปวช.1/9">ปวช.1/9</option>
                            <option value="ปวช.1/10">ปวช.1/10</option>
                            <option value="ปวช.1/11">ปวช.1/11</option>
                            <option value="ปวช.1/12">ปวช.1/12</option>
                            <option value="ปวช.2/1">ปวช.2/1</option>
                            <option value="ปวช.2/2">ปวช.2/2</option>
                            <option value="ปวช.2/3">ปวช.2/3</option>
                            <option value="ปวช.2/4">ปวช.2/4</option>
                            <option value="ปวช.2/5">ปวช.2/5</option>
                            <option value="ปวช.2/6">ปวช.2/6</option>
                            <option value="ปวช.2/7">ปวช.2/7</option>
                            <option value="ปวช.2/8">ปวช.2/8</option>
                            <option value="ปวช.2/9">ปวช.2/9</option>
                            <option value="ปวช.2/10">ปวช.2/10</option>
                            <option value="ปวช.2/11">ปวช.2/11</option>
                            <option value="ปวช.2/12">ปวช.2/12</option>
                            <option value="ปวช.3/1">ปวช.3/1</option>
                            <option value="ปวช.3/2">ปวช.3/2</option>
                            <option value="ปวช.3/3">ปวช.3/3</option>
                            <option value="ปวช.3/4">ปวช.3/4</option>
                            <option value="ปวช.3/5">ปวช.3/5</option>
                            <option value="ปวช.3/6">ปวช.3/6</option>
                            <option value="ปวช.3/7">ปวช.3/7</option>
                            <option value="ปวช.3/8">ปวช.3/8</option>
                            <option value="ปวช.3/9">ปวช.3/9</option>
                            <option value="ปวช.3/10">ปวช.3/10</option>
                            <option value="ปวช.3/11">ปวช.3/11</option>
                            <option value="ปวช.3/12">ปวช.3/12</option>
                        </select>
                        <p></p>
                        <select class="form-select" id="newMajor" required>
                            <option selected>-เลือกสาขาวิชา-</option>
                            <option value="การบัญชี">การบัญชี</option>
                            <option value="การตลาดดิจิทัล">การตลาดดิจิทัล</option>
                            <option value="การโรงแรม">การโรงแรม</option>
                            <option value="โลจิสติกส์">โลจิสติกส์</option>
                            <option value="คอมพิวเตอร์ธุรกิจ">คอมพิวเตอร์ธุรกิจ</option>
                            <option value="เทคโนโลยีสารสนเทศ">เทคโนโลยีสารสนเทศ</option>
                            <option value="การจัดการโลจิสติกส์และซัพพลายเชน">การจัดการโลจิสติกส์และซัพพลายเชน</option>
                            <option value="เทคโนโลยีธุกิจดิจิทัล">เทคโนโลยีธุกิจดิจิทัล</option>
                            <option value="ดิจิทัลกราฟฟิก">ดิจิทัลกราฟฟิก</option>
                            <option value="ภาษาต่างประเทศธุรกิจ">ภาษาต่างประเทศธุรกิจ</option>
                        </select>
                        <p></p>
                        <!-- เปลี่ยน input type number เป็น input type text สำหรับ newNumber -->
                        <input type="text" class="form-control mb-2" oninput="validateNumber(this)" id="newNumber"
                            placeholder="เลขที่ใหม่"required>
                            <p></p>
                        <input type="text" class="form-control mb-2" oninput="validateNumber(this)" id="newStudentid"
                            placeholder="รหัสนักศึกษาใหม่"required>

                        <button id="saveChangesBtn" class="btn btn-outline-success">บันทึกการเปลี่ยนแปลง</button>
                        <button id="cancelEditBtn" class="btn btn-outline-danger">ยกเลิก</button>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- ส่วนที่ให้ใส่ popup ถามความแน่ใจ -->
    <div class="modal" tabindex="-1" role="dialog" id="confirmationModal">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">ยืนยันการบันทึก</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    คุณแน่ใจที่จะบันทึกการเปลี่ยนแปลงหรือไม่?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
                    <button type="button" class="btn btn-primary" id="confirmSaveChangesBtn">ยืนยัน</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
    <script src="firebaseConfig.js" type="module"></script>
    <script src="logout.js" type="module"></script>
    <script src="datauser.js" type="module"></script>

</body>

</html>
