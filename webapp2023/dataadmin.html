<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>เว็บแอปพลิเคชันสื่อการสอนระบบการจัดการกลยุทธ์การเล่นฟุตบอล</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,100;0,200;0,400;1,100&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            padding-top: 56px;
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('images/bg2.jpg');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
        }

        .navbar {
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1001;
            background-color: black;

            display: block;
        }

        .navbar-brand {
            color: white;
        }

        ul {
            position: fixed;
            top: 56px;
            /* ปรับค่า top ตามความต้องการ */
            width: 100vw;
            left: 0;
            z-index: 1002;
            /* ให้ z-index มีค่าสูงกว่า .col-8 */
            background-color: black;
        }

        @media (max-width: 576px) {
            body {
                font-size: 14px;
                /* ปรับขนาดฟ้อนท์เพื่อให้พอดีกับจอโทรศัพท์ */
            }
        }

        .nav-link {
            color: white;
        }

        .nav-link.active {
            color: black;
            background-color: white;
            /* หรือสีที่คุณต้องการ */
            border-radius: 10px;
        }

        h1,
        h2,
        h3,
        p {
            color: #333;
        }

        .fullWidthCard {
            left: 0;
            right: 0;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.1);
            /* สีขาวทึบทับด้วยสีใส */
            color: white;
            /* ตัวหนังสือสีขาว */
            border: 1px solid white;
            /* ขอบสีขาว */
        }

        .card-title,
        .card-text {
            color: white;
            /* ทำให้ตัวหนังสือใน card-title และ card-text เป็นสีขาว */
        }

        .btn-outline-dark {
            color: white;
            border-color: white;
            /* ขอบปุ่มสีขาว */
        }

        .btn-outline-dark:hover {
            color: #000;
            background-color: white;
            /* สีพื้นหลังปุ่มเมื่อโฮเวอร์ */
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg ">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">TacTics</a>
            <div>
                <button id="logout" class="btn btn-sm btn-outline-danger">ออกจากระบบ</button>
            </div>
        </div>
    </nav>
    <ul class="nav nav-tabs">
        <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="dataadmin.html">ข้อมูลส่วนตัว</a>
        </li>
    </ul>

    <div class="container mt-5">
        <div class="row" id="userCardList">
          <!-- ข้อมูลผู้ใช้จะถูกเพิ่มที่นี่ -->
        </div>
      </div>
         

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
    <script src="firebaseConfig.js" type="module"></script>
    <script src="logout.js" type="module"></script>
    <script type="module" src="dataadmin.js"></script>

</body>

</html>
