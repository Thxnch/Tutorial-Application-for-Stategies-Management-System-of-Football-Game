<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>เว็บแอปพลิเคชันสื่อการสอนระบบการจัดการกลยุทธ์การเล่นฟุตบอล</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,100;0,200;0,400;1,100&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('images/bg2.jpg');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            /* ทำให้รูปภาพติดตามการเลื่อนหน้าจอ */
            color: white;
            text-align: center;
        }


        .content {
            width: 100%;
            position: absolute;
            margin-top: 550px;
            transform: translateY(-50%);
            text-align: center;
            color: white;
        }

        .content h1 {
            font-size: 100px;
        }

        .content p {
            font-size: 50px;
        }

        .custom-button {
            width: 200px;
            padding: 15px 0;
            text-align: center;
            margin-top: 50px;
            border: 2px solid #330066;
            border-radius: 25px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .custom-button .span {
            background: #330099;
            height: 100%;
            width: 0%;
            border-radius: 25px;
            position: absolute;
            left: 0;
            bottom: 0;
            z-index: -1;
            transition: 0.5s;
        }

        .custom-button:hover .span {
            width: 100%;
        }

        .custom-button:hover {
            border: none;
        }

        img {
            position: absolute;
            /* ให้รูปอยู่ในตำแหน่งที่ต้องการ */
            top: 0;
            /* จัดให้อยู่ทางด้านบน */
            left: 0;
            /* จัดให้อยู่ทางด้านซ้าย */
            margin: 20px;
            /* เพิ่มระยะห่างของรูป */
            width: 150px;
            /* กำหนดความกว้างของรูป */
            height: auto;
        }

        @media (max-width: 768px) {
            .content {
                margin-top: 100%;
                /* หรือค่าที่ต้องการ */
            }

            .content h1 {
                font-size: 50px;
            }

            .content p {
                font-size: 25px;
            }
        }

    </style>

</head>

<body>

    <img src="images/logo.png">
    <div class="content">
        <h1>TACTIC FOOTBALL</h1>
        <p>กลยุทธ์ฟุตบอล</p>

        <a href="login.html" role="button" class="custom-button" type="button">
            เริ่มต้น
            <span class="span"></span>
        </a>
    </div>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
<script src="firebaseConfig.js" type="module"></script>
</body>

</html>
