<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>เว็บแอปพลิเคชันสื่อการสอนระบบการจัดการกลยุทธ์การเล่นฟุตบอล</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,100;0,200;0,400;1,100&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('images/bg2.jpg');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.2);
            /* สีขาวทึบทับด้วยสีใส */
            color: white;
            /* ตัวหนังสือสีขาว */
            border: 1px solid white;
            /* ขอบสีขาว */
        }

        .card-title,
        .card-text {
            color: white;
            /* ทำให้ตัวหนังสือใน card-title และ card-text เป็นสีขาว */
        }

        h1,
        h2,
        h3,
        p {
            color: white;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container-fluid {
            width: 90vw;
            /* ให้ card มีขนาดเท่ากับ 80% ของ viewport width */
            max-width: 400px;
            /* ปรับขนาด card ให้มีขนาดสูงสุดที่ 400px */
        }

        .no-underline {
            text-decoration: none;
            color: inherit;
        }

        .no-underline:hover {
            text-decoration: underline;
        }

        a {
            text-decoration: none;
            /* ไม่ให้มีขีดเส้นใต้ */
            color: inherit;
            /* ให้ลิงก์ใช้สีเดียวกับข้อความรอบๆ */
        }

        a:hover {
            text-decoration: underline;
            /* ขีดเส้นใต้เมื่อเม้าส์ hover (หากต้องการ) */
        }
    </style>

</head>

<body>
    <div class="container-fluid">
        <div id="form-area">

            <!-- form ลงทะเบียน -->
            <div class="card form-container sign-up-container" id="signUpForm">
                <div class="card-body">
                    <form action="#">
                        <center><h1>ลงทะเบียน</h1></center>

                        <div class="mb-3">
                            <label for="username1" class="form-label">ชื่อผู้ใช้</label>
                            <input type="text" placeholder="ชื่อผู้ใช้" id="username1" class="form-control" required />
                        </div>

                        <div class="mb-3">
                            <label for="password1" class="form-label">รหัสผ่าน</label>
                            <input type="password" placeholder="รหัสผ่าน" id="password1" class="form-control"
                                required />
                        </div>

                        <div class="mb-3">
                            <label for="fullname" class="form-label">ชื่อ-นามสกุล</label>
                            <input type="text" placeholder="ชื่อ-นามสกุล" id="fullname" class="form-control" required />
                        </div>

                        <div class="mb-3">
                            <label for="room" class="form-label">เลือกชั้น</label>
                            <select class="form-select" id="room" required>
                                <option selected>-เลือกชั้น-</option>
                                <!-- เพิ่มตัวเลือกของชั้นต่างๆ ตามที่คุณต้องการ -->
                                <option value="ปวช.1/1">ปวช.1/1</option>
                                <option value="ปวช.1/2">ปวช.1/2</option>
                                <option value="ปวช.1/3">ปวช.1/3</option>
                                <option value="ปวช.1/4">ปวช.1/4</option>
                                <option value="ปวช.1/5">ปวช.1/5</option>
                                <option value="ปวช.1/6">ปวช.1/6</option>
                                <option value="ปวช.1/7">ปวช.1/7</option>
                                <option value="ปวช.1/8">ปวช.1/8</option>
                                <option value="ปวช.1/9">ปวช.1/9</option>
                                <option value="ปวช.1/10">ปวช.1/10</option>
                                <option value="ปวช.1/11">ปวช.1/11</option>
                                <option value="ปวช.1/12">ปวช.1/12</option>
                                <option value="ปวช.2/1">ปวช.2/1</option>
                                <option value="ปวช.2/2">ปวช.2/2</option>
                                <option value="ปวช.2/3">ปวช.2/3</option>
                                <option value="ปวช.2/4">ปวช.2/4</option>
                                <option value="ปวช.2/5">ปวช.2/5</option>
                                <option value="ปวช.2/6">ปวช.2/6</option>
                                <option value="ปวช.2/7">ปวช.2/7</option>
                                <option value="ปวช.2/8">ปวช.2/8</option>
                                <option value="ปวช.2/9">ปวช.2/9</option>
                                <option value="ปวช.2/10">ปวช.2/10</option>
                                <option value="ปวช.2/11">ปวช.2/11</option>
                                <option value="ปวช.2/12">ปวช.2/12</option>
                                <option value="ปวช.3/1">ปวช.3/1</option>
                                <option value="ปวช.3/2">ปวช.3/2</option>
                                <option value="ปวช.3/3">ปวช.3/3</option>
                                <option value="ปวช.3/4">ปวช.3/4</option>
                                <option value="ปวช.3/5">ปวช.3/5</option>
                                <option value="ปวช.3/6">ปวช.3/6</option>
                                <option value="ปวช.3/7">ปวช.3/7</option>
                                <option value="ปวช.3/8">ปวช.3/8</option>
                                <option value="ปวช.3/9">ปวช.3/9</option>
                                <option value="ปวช.3/10">ปวช.3/10</option>
                                <option value="ปวช.3/11">ปวช.3/11</option>
                                <option value="ปวช.3/12">ปวช.3/12</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="major" class="form-label">เลือกสาขาวิชา</label>
                            <select class="form-select" id="major" required>
                                <option selected>-เลือกสาขาวิชา-</option>
                                <option value="การบัญชี">การบัญชี</option>
                                <option value="การตลาดดิจิทัล">การตลาดดิจิทัล</option>
                                <option value="การโรงแรม">การโรงแรม</option>
                                <option value="โลจิสติกส์">โลจิสติกส์</option>
                                <option value="คอมพิวเตอร์ธุรกิจ">คอมพิวเตอร์ธุรกิจ</option>
                                <option value="เทคโนโลยีสารสนเทศ">เทคโนโลยีสารสนเทศ</option>
                                <option value="การจัดการโลจิสติกส์และซัพพลายเชน">การจัดการโลจิสติกส์และซัพพลายเชน</option>
                                <option value="เทคโนโลยีธุกิจดิจิทัล">เทคโนโลยีธุกิจดิจิทัล</option>
                                <option value="ดิจิทัลกราฟฟิก">ดิจิทัลกราฟฟิก</option>
                                <option value="ภาษาต่างประเทศธุรกิจ">ภาษาต่างประเทศธุรกิจ</option>
                            </select>
                        </div>

                        <div class="d-flex flex-row">
                            <div class="mb-3">
                                <label for="studentid" class="form-label">รหัสนักศึกษา</label>
                                <input type="number" class="form-control" id="studentid" placeholder="รหัสนักศึกษา" />
                            </div>
                            <div class="mb-3 ms-3">
                                <label for="number" class="form-label">เลขที่</label>
                                <input type="number" class="form-control" id="number" placeholder="เลขที่" />
                            </div>
                        
                            
                        </div>
                        

                        <center><button id="register" class="btn btn-secondary">ลงทะเบียน</button></center><p></p>
                        <center><a href="login.html" class="no-underline">ฉันมีบัญชีอยู่แล้ว</a></center>
                    </form>
                </div>
            </div>
        </div>
    </div>







    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>



    <script src="register.js" type="module"></script>
    <script src="firebaseConfig.js" type="module"></script>

</body>

</html>
