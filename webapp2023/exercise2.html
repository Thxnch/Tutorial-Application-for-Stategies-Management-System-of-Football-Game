<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>เว็บแอปพลิเคชันสื่อการสอนระบบการจัดการกลยุทธ์การเล่นฟุตบอล</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,100;0,200;0,400;1,100&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            padding-top: 56px;
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('images/bg2.jpg');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
        }

        .navbar {
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1001;
            background-color: black;

            display: block;
        }

        .navbar-brand {
            color: white;
        }

        ul {
            position: fixed;
            top: 56px;
            /* ปรับค่า top ตามความต้องการ */
            width: 100vw;
            left: 0;
            z-index: 1002;
            /* ให้ z-index มีค่าสูงกว่า .col-8 */
            background-color: black;

        }

        @media (max-width: 576px) {
            body {
                font-size: 14px;
                /* ปรับขนาดฟ้อนท์เพื่อให้พอดีกับจอโทรศัพท์ */
            }
        }

        .nav-link {
            color: white;
        }

        .nav-link.active {
            color: black;
            background-color: white;
            /* หรือสีที่คุณต้องการ */
            border-radius: 10px;
        }

        h1,
        h2,
        h3,
        p {
            color: white;
        }

        .fullWidthCard {
            left: 0;
            right: 0;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.1);
            /* สีขาวทึบทับด้วยสีใส */
            color: white;
            /* ตัวหนังสือสีขาว */
            border: 1px solid white;
            /* ขอบสีขาว */
        }

        .card-title,
        .card-text {
            color: white;
            /* ทำให้ตัวหนังสือใน card-title และ card-text เป็นสีขาว */
        }

        #field {
            position: absolute;
            width: 620px;
            /* สลับค่า width และ height */
            height: 460px;
            /* สลับค่า width และ height */
            background-image: url('images/stage1.jpg');
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%)
                /* หมุนรูปและจัดตำแหน่งตรงกลางจอ */
        }

        .player {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            background-color: white;
        }

        .player-name-input {
            margin-top: 5px;
            width: 100%;
            box-sizing: border-box;
        }

        #player-toolbar {
            margin-top: 10px;

        }

        #player-toolbar button {
            padding: 5px 10px;
            cursor: pointer;
            z-index: 1004;
            margin-top: 600px;
        }

        .empty-slot {
            position: absolute;
            width: 36px;
            height: 36px;
            border: 2px dashed #000;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg ">
        <div class="container-fluid">
            <a class="navbar-brand" href="media1.html">TacTics</a>
            <div>
                <button id="logout" class="btn btn-sm btn-outline-danger">ออกจากระบบ</button>
            </div>
        </div>
    </nav>
    <ul class="nav nav-tabs">
        <li class="nav-item">
            <a class="nav-link " href="media1.html">สื่อการสอน</a>
        </li>
        <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="exercise.html">แบบฝึกหัด</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="datauser.html">ข้อมูลส่วนตัว</a>
        </li>
        <!-- เพิ่มส่วนนี้ในตำแหน่งที่คุณต้องการให้แสดงคะแนน -->



    </ul>
    <div class="container-fluid mt-5">
        <div class="row">
            <div class="col-md-6 mx-auto">
                <div class="card" id="fullWidthCard">
                    <div class="card-header">
                        <!-- แสดงคะแนน -->
                        <div id="score-display">
                            <h3>คะแนน: <span id="score-value"></span>
                            </h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="field">
        <div id="players-container"></div>
        <div id="slot1" class="empty-slot" style="left: 100px; top: 270px;"></div>
        <div id="slot2" class="empty-slot" style="left: 100px; top: 150px;"></div>
        <div id="slot3" class="empty-slot" style="left: 250px; top: 340px;"></div>
        <div id="slot4" class="empty-slot" style="left: 190px; top: 210px;"></div>
        <div id="slot5" class="empty-slot" style="left: 330px; top: 270px;"></div>
        <div id="slot6" class="empty-slot" style="left: 330px; top: 150px;"></div>
        <div id="slot7" class="empty-slot" style="left: 250px; top: 80px;"></div>
        <div id="slot8" class="empty-slot" style="left: 450px; top: 120px;"></div>
        <div id="slot9" class="empty-slot" style="left: 450px; top: 210px;"></div>
        <div id="slot10" class="empty-slot" style="left: 450px; top: 300px;"></div>
    </div>
    <!-- เพิ่มโค้ดนี้ในตำแหน่งที่เหมาะสมใน body -->
    <div id="color-name-popup"
        style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: rgba(20, 28, 150, 0.411); padding: 20px; border: 1px solid #ccc; z-index: 999; border-radius: 10px;">
        <h3>เลือกสีและตำแหน่งผู้เล่น</h3>
        <label for="color" style="color: white;">เลือกสี:</label>
        <select id="color" name="color">
            <option value="red">แดง</option>
            <option value="yellow">เหลือง</option>
            <option value="blue">น้ำเงิน</option>
        </select>
        <br>
        <label for="playerName" style="color: white;">ชื่อตำแหน่งผู้เล่น:</label>
        <input type="text" id="playerName" name="playerName">
        <br>
        <p></p>
        <center><button
                onclick="setColorAndName(document.getElementById('color').value, document.getElementById('playerName').value)">OK</button>
            <button onclick="cancelColorAndName()">Cancel</button>
        </center>
    </div>

    <div id="player-toolbar">
        <center>
            <button onclick="addPlayer(50, 50)">เพิ่มผู้เล่น</button>
            <button onclick="confirmButtonClicked()">ยืนยัน</button>
        </center>
    </div>

    <!-- เพิ่มปุ่ม Confirm และเรียกใช้ฟังก์ชัน confirmButtonClicked() เมื่อคลิก -->
    



    <script src="game352.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>

    <script src="firebaseConfig.js" type="module"></script>
    <script src="logout.js" type="module"></script>
</body>

</html>
