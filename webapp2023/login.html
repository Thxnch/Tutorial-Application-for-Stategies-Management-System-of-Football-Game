<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>เว็บแอปพลิเคชันสื่อการสอนระบบการจัดการกลยุทธ์การเล่นฟุตบอล</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,100;0,200;0,400;1,100&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('images/bg2.jpg');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.2);
            /* สีขาวทึบทับด้วยสีใส */
            color: white;
            /* ตัวหนังสือสีขาว */
            border: 1px solid white;
            /* ขอบสีขาว */
        }

        .card-title,
        .card-text {
            color: white;
            /* ทำให้ตัวหนังสือใน card-title และ card-text เป็นสีขาว */
        }

        h1,
        h2,
        h3,
        p {
            color: white;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container-fluid {
            width: 90vw;
            /* ให้ card มีขนาดเท่ากับ 80% ของ viewport width */
            max-width: 400px;
            /* ปรับขนาด card ให้มีขนาดสูงสุดที่ 400px */
        }

        .no-underline {
            text-decoration: none;
            color: inherit;
        }

        .no-underline:hover {
            text-decoration: underline;
        }

        a {
            text-decoration: none;
            /* ไม่ให้มีขีดเส้นใต้ */
            color: inherit;
            /* ให้ลิงก์ใช้สีเดียวกับข้อความรอบๆ */
        }

        a:hover {
            text-decoration: underline;
            /* ขีดเส้นใต้เมื่อเม้าส์ hover (หากต้องการ) */
        }
    </style>
</head>

<body>



    <div class="container-fluid">
        <div id="form-area">

            <form id="loginform">
                <!-- โค้ดฟอร์ม login ทั้งหมด -->
                <br>

                <div class="container-fluid">
                    <div class="card border rounded p-3">
                        <div class="card-body">
                            <h1 class="card-title text-center">ลงชื่อเข้าใช้</h1>

                            <div class="mb-3">
                                <label for="user" class="form-label">ชื่อผู้ใช้</label>
                                <input type="email" class="form-control" placeholder="กรอกชื่อผู้ใช้" id="username" name="username"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">รหัสผ่าน</label>
                                <input type="password" class="form-control" placeholder="กรอกรหัสผ่าน" id="password" name="password"
                                    required>
                            </div>

                            <div class="text-center">
                                <button type="submit" id="login-button" class="btn btn-secondary">เข้าสู่ระบบ</button>
                                <br><br><a href="register.html" class="no-underline">ต้องการลงทะเบียน</a>

                            </div>
                        </div>
                    </div>
                </div>
            </form>


            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
                crossorigin="anonymous"></script>

                <script type="module" src="firebaseConfig.js"></script>
                <script type="module" src="login.js"></script>


</body>

</html>
